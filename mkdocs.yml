# EvoFlow 官方文档站点 — 源文件位于 docs/，构建：make docs-build
# 三知识库：docs/user（用户指南）、docs/system（系统内部）、docs/roles（智能体产出）
site_name: EvoFlow 文档
site_description: EvoFlow 教程、操作指南、参考手册与架构说明
site_author: EvoFlow contributors

repo_url: https://github.com/EvovexAI/EvoFlow
repo_name: EvoFlow
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

# exclude_docs：未纳入 MkDocs 导航 / 站点的 Markdown（gitignore 风格；无斜杠会匹配任意目录）
exclude_docs: |
  /README.md
  user/README.md
  system/README.md
  system/internal/**
  system/presentations/**
  system/proposals/**
  system/reports/**
  system/design/**
  system/api/**
  system/CHANGELOG-*.md
  system/team-artifact-flow-sop.md
  roles/**
  assets/plan-supervisor/README.md
  assets/screenshots/README.md
  assets/README-GUIDE.md
  assets/guides/**

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: 切换深色模式
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: 切换浅色模式

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html

