# EvoFlow 官方文档站点 — 源文件位于 docs/，构建：make docs-build
site_name: EvoFlow 文档
site_description: EvoFlow 教程、操作指南、参考手册与架构说明
site_author: EvoFlow contributors

repo_url: https://github.com/EvovexAI/EvoFlow
repo_name: EvoFlow
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

# exclude_docs：未纳入 MkDocs 导航的 Markdown
exclude_docs: |
  internal/**
  assets/plan-supervisor/README.md
  assets/screenshots/README.md
  presentations/**

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: 切换深色模式
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: 切换浅色模式

plugins:
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html

